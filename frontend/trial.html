<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>aiplay — trial</title>
  <link rel="stylesheet" href="/style.css">
  <!-- Mermaid 9.4.3 (UMD). Not v10 — v10's UMD render path collapses to
       16×16 in Firefox due to getBBox() returning 0 on detached elements
       during pre-render measurement (Mermaid 10 pre-renders into a
       hidden container, measures, then attaches; Firefox can't measure
       detached SVG elements). The same root cause defeats the
       htmlLabels:false workaround: even with native <text>/<tspan>
       labels, label-container rects came out 15×15 and viewBox 16×16.
       v9.4.3 attaches before measuring, works correctly in Firefox.
       Per Mozilla source-docs Mermaid integration page. Vendored
       locally to eliminate CDN dependency and avoid Firefox strict
       tracking-protection blocking third-party script loads. -->
  <script src="/vendor/mermaid.min.js"></script>
  <!-- Cytoscape (interactive CID-flow tab). UMD globals: `cytoscape`,
       `dagre`, `cytoscapeDagre`. Loaded from CDN to keep the repo small;
       falls back gracefully (renderCidFlowInteractiveTab logs a warn and
       leaves the container empty if `cytoscape` is undefined at mount).
       SRI sha384 integrity hashes pin the exact bytes — if jsDelivr ever
       serves modified content the browser refuses to execute. Re-compute
       on version bumps:
         curl -sL <url> | openssl dgst -sha384 -binary | openssl base64 -A
       crossorigin="anonymous" is required for SRI on cross-origin scripts. -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.0/dist/cytoscape.min.js"
          integrity="sha384-kpMsYllYzyaWU69Piok08rPNktpnjqAoDMdB00fjqUkEk3lkuUbSuwJ+oXrjvN6B"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"
          integrity="sha384-2IH3T69EIKYC4c+RXZifZRvaH5SRUdacJW7j6HtE5rQbvLhKKdawxq6vpIzJ7j9M"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"
          integrity="sha384-u69h9ebXeSjlg6q/rb1zKTRAGu/h8deCl0409xpS/QJctMKnc4M9Fzkm01VOQdeF"
          crossorigin="anonymous"></script>
</head>
<body class="trial-page">
  <header class="trial-header">
    <div class="trial-header-row">
      <a href="/" class="back-link" title="back to matrix">← matrix</a>
      <h1 id="trial-title">Loading…</h1>
      <span id="trial-status-pill" class="status-pill idle">idle</span>
      <!-- T14 — abort button: hidden by default; trial.js reveals when status=running -->
      <button id="trial-abort-btn" class="btn-abort" style="display:none;"
        title="stop trial (current turn finishes, next turns skipped)">⏹ Stop</button>
      <!-- Export JSON button — hidden until trial id is resolved (row_id mode) -->
      <button id="trial-export-btn" class="btn-export" style="display:none;"
        title="download this trial as JSON">⬇ Export JSON</button>
    </div>
    <div id="row-summary" class="row-summary"></div>
  </header>
  <main class="trial-main">
    <div class="trial-tabs">
      <button class="trial-tab-btn active" data-tab="turns">Turns</button>
      <button class="trial-tab-btn" data-tab="plan">Turn Plan</button>
      <button class="trial-tab-btn" data-tab="verdicts">Verdicts</button>
      <button class="trial-tab-btn" data-tab="note">Note</button>
      <button class="trial-tab-btn" data-tab="cidflow">CID flow</button>
      <button class="trial-tab-btn" data-tab="cidflow-interactive">CID flow (interactive)</button>
      <button class="trial-tab-btn" data-tab="services">Services</button>
      <button class="trial-tab-btn" data-tab="raw">Raw JSON</button>
    </div>
    <div id="tab-turns" class="tab-content active"></div>
    <div id="tab-plan" class="tab-content"></div>
    <div id="tab-verdicts" class="tab-content"></div>
    <div id="tab-note" class="tab-content"></div>
    <div id="tab-cidflow" class="tab-content"></div>
    <div id="tab-cidflow-interactive" class="tab-content"></div>
    <div id="tab-services" class="tab-content"></div>
    <div id="tab-raw" class="tab-content"><div class="pre-with-copy"><button class="copy-btn copy-pre-btn" title="copy contents to clipboard">📋</button><pre id="raw-json"></pre></div></div>
  </main>
  <script type="module" src="/trial.js"></script>
</body>
</html>
