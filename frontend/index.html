<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>aiplay — cidgar Harness C</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/ag-grid-community@32/styles/ag-grid.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/ag-grid-community@32/styles/ag-theme-quartz.css">
  <!-- CodeMirror 5 (single-file CDN build, no bundler). T12 row-drawer JSON editor. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/dracula.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/lint/lint.css">
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsonlint-mod@1.7.6/web/jsonlint.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/lint/lint.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/lint/json-lint.min.js"></script>
</head>
<body>
  <header class="toolbar">
    <h1>aiplay — cidgar Harness C</h1>
    <div class="toolbar-actions">
      <button id="btn-add-row">+ Add Row</button>
      <button id="btn-run-all">▶ Run All</button>
      <button id="btn-delete-all" class="btn-danger" title="delete all matrix rows (click twice to confirm)">⛌ Delete All</button>
      <button id="btn-settings">⚙ Settings</button>
    </div>
  </header>

  <main>
    <div id="matrix-grid" class="ag-theme-quartz" style="height: calc(100vh - 80px);"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@32/dist/ag-grid-community.min.js"></script>
  <script type="module" src="/config.js"></script>
  <script type="module" src="/drawer.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
