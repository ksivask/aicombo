# Matrix seed rows (Plan A — only langchain is actively running)

matrix_seed_rows:
  - {framework: langchain, api: chat, stream: false, state: false, llm: ollama, mcp: NONE, routing: via_agw}
  - {framework: langchain, api: chat, stream: false, state: false, llm: ollama, mcp: weather, routing: via_agw}
  # Full agent-loop demo: langchain binds MCP tools, LLM chooses tool, adapter
  # round-trips. Exercises cidgar f1+f2+f3+f4+f5 in a single trial.
  - {framework: langchain, api: chat, stream: false, state: false, llm: ollama, mcp: fetch, routing: via_agw}
  # Plan B T10 — verdict (d) compaction resilience. Compact turn between t2/t3
  # (with_compact=true selects the with_mcp_with_compact template).
  - {framework: langchain, api: chat, stream: false, state: false, llm: ollama, mcp: weather, routing: via_agw, with_compact: true}
  # Plan B T11 — verdict (e) state-mode gap. force_state_ref turn at idx 2
  # references the response id from turn idx 0 (lookback=2). Only autogen +
  # llamaindex implement Responses-API state mode; this row uses autogen.
  - {framework: autogen, api: responses, stream: false, state: true, llm: chatgpt, mcp: NONE, routing: via_agw, with_force_state_ref: true}
  - {framework: NONE, api: NONE, stream: false, state: false, llm: NONE, mcp: weather, routing: via_agw}

# Default turn-plan templates — keyed by (has_mcp, api_category)
# Plan A implements: no_mcp_chat, with_mcp_chat, direct_mcp
# Plan B implements: with_mcp_responses, responses_stateful, with_compact, etc.

turn_plan_templates:
  no_mcp_chat:
    turns:
      - {kind: user_msg, content: "Hello, tell me a short one-line fact about testing."}
      - {kind: user_msg, content: "Can you elaborate on that?"}
      - {kind: user_msg, content: "Summarize what you just told me."}

  with_mcp_weather:
    turns:
      - {kind: user_msg, content: "Hello, what tools do you have available?"}
      - {kind: user_msg, content: "What's the weather in Paris?"}
      - {kind: user_msg, content: "And in London?"}

  with_mcp_news:
    turns:
      - {kind: user_msg, content: "Hello, what tools do you have available?"}
      - {kind: user_msg, content: "Give me news about AI."}
      - {kind: user_msg, content: "Any news about space exploration?"}

  with_mcp_library:
    turns:
      - {kind: user_msg, content: "Hello, what tools do you have available?"}
      - {kind: user_msg, content: "Find books with 'Clean Code' in the title."}
      - {kind: user_msg, content: "Show me more results."}

  with_mcp_fetch:
    turns:
      - {kind: user_msg, content: "Hello, what tools do you have available?"}
      - {kind: user_msg, content: "Fetch https://example.com and summarize it."}
      - {kind: user_msg, content: "Fetch https://httpbin.org/uuid and tell me what it returns."}

  # Plan B T10 — with_compact=true rows use this template. Compact turn sits
  # between two user_msg turns so verdict (d) can bracket pre/post CID sets.
  with_mcp_with_compact:
    turns:
      - {kind: user_msg, content: "Hello, what tools do you have available?"}
      - {kind: user_msg, content: "What's the weather in Paris?"}
      - {kind: compact,  strategy: "drop_half"}
      - {kind: user_msg, content: "And in London?"}

  # Plan B T11 — with_force_state_ref=true rows use this template.
  # Drive 2 user_msg turns normally (builds a response-id chain), then a
  # force_state_ref that the runner resolves to the response id from turn
  # idx 0 (lookback=2 skips the immediate prior turn). The final user_msg
  # is there so verdict (c) has ≥2 turns and verdict (e) has a well-defined
  # "after-the-jump" audit window to inspect via _cids_for_turn_window().
  with_responses_state_force_ref:
    turns:
      - {kind: user_msg, content: "Hi! Give me a one-line fact about testing."}
      - {kind: user_msg, content: "Can you elaborate?"}
      - {kind: force_state_ref, lookback: 2, content: "Refer back to the earlier fact."}
      - {kind: user_msg, content: "Summarize what we discussed."}

  # E21 — with_reset rows exercise the reset_context boundary semantic.
  # Two distinct conversations on different topics in one trial. Verdict (c)
  # treats the reset_context turn as a segment boundary and asserts no CID
  # leaks across it (cross-segment overlap = isolation breach = verdict fail).
  # NOT resized — verdict (c)'s segment math depends on this exact shape.
  with_reset:
    turns:
      - {kind: user_msg, content: "Tell me a fact about quantum computing."}
      - {kind: user_msg, content: "Elaborate."}
      - {kind: reset_context}
      - {kind: user_msg, content: "Hello, what's a fun fact about ocean exploration?"}
      - {kind: user_msg, content: "Anything else?"}

  direct_mcp:
    turns:
      - {kind: user_msg, content: "{mcp_specific_query}"}
      - {kind: user_msg, content: "{mcp_followup_query}"}

# Per-MCP query substitutions for the direct_mcp template (llm=NONE rows).
# The direct-mcp adapter uses deterministic keyword routing — these queries
# are chosen so the adapter can pick the right tool and extract reasonable
# args via simple regex. Plan B will make this richer + per-row editable.
mcp_query_substitutions:
  weather:
    mcp_specific_query: "What's the weather in Paris?"
    mcp_followup_query: "What about London?"
  news:
    mcp_specific_query: "Get news about AI."
    mcp_followup_query: "News about space."
  library:
    mcp_specific_query: "Find books about Testing."
    mcp_followup_query: "More books about Python."
  fetch:
    mcp_specific_query: "Fetch https://example.com"
    mcp_followup_query: "Fetch https://httpbin.org/uuid"
