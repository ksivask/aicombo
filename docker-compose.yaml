networks:
  aiplay-network:
    driver: bridge
    name: aiplay_net

services:

  # ── Harness API (+ frontend) ──
  harness-api:
    build: ./harness
    image: aiplay-harness:local
    ports:
      - "8000:8000"
    environment:
      - AIPLAY_DEFAULT_ROUTING=via_agw
      - MAX_CONCURRENT_TRIALS=1
      - TURN_CAP=10
      - AGW_CONTAINER_NAME=agentgateway
      - AGW_ADMIN_URL=http://agentgateway:15000
      - DATA_DIR=/data
    # Read .env so providers.py can detect API key presence for the UI dropdown.
    # The harness doesn't USE the keys (adapters do), but it needs them in env
    # to report availability to the frontend.
    env_file: [.env]
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./frontend:/app/frontend:ro
      - ./harness/defaults.yaml:/app/defaults.yaml:ro
    depends_on:
      - agentgateway
    networks: [aiplay-network]
    restart: unless-stopped

  # ── AGW (cidgar branch, externally-built) ──
  agentgateway:
    image: agentgateway:cidgar
    command: ["-f", "/config/gateway-config.yaml"]
    ports:
      - "8080:8080"
      - "15000:15000"
    environment:
      - RUST_LOG=info,agentgateway::governance=debug
      - RUST_LOG_FORMAT=json
      - ADMIN_ADDR=0.0.0.0:15000
    extra_hosts:
      - "host.docker.internal:192.168.64.1"
    volumes:
      - ./agw/config.yaml:/config/gateway-config.yaml:ro
    networks: [aiplay-network]
    restart: unless-stopped

  # ── Adapter: langchain (Plan A's only framework adapter) ──
  adapter-langchain:
    build: ./adapters/langchain
    image: aiplay-adapter-langchain:local
    environment:
      - ADAPTER_PORT=5001
      - AGW_LLM_BASE_URL_OLLAMA=http://agentgateway:8080/llm/ollama/v1
      - AGW_LLM_BASE_URL_MOCK=http://agentgateway:8080/llm/mock/v1
      - DIRECT_LLM_BASE_URL_MOCK=http://mock-llm:8000/v1
      - AGW_MCP_WEATHER=http://agentgateway:8080/mcp/weather
      - AGW_MCP_NEWS=http://agentgateway:8080/mcp/news
      - AGW_MCP_LIBRARY=http://agentgateway:8080/mcp/library
      - AGW_MCP_FETCH=http://agentgateway:8080/mcp/fetch
      - DIRECT_LLM_BASE_URL_OLLAMA=http://host.docker.internal:11434/v1
      - DIRECT_MCP_WEATHER=http://mcp-weather:8000/mcp
      - DIRECT_MCP_NEWS=http://mcp-news:8000/mcp
      - DIRECT_MCP_LIBRARY=http://mcp-library:8000/mcp
      - DIRECT_MCP_FETCH=http://mcp-fetch:8000/mcp
      - DEFAULT_OLLAMA_MODEL=qwen2.5:7b
    env_file: [.env]
    extra_hosts:
      - "host.docker.internal:192.168.64.1"
    depends_on:
      - agentgateway
    networks: [aiplay-network]
    restart: unless-stopped

  # ── Adapter: direct-mcp (llm=NONE rows) ──
  #   Drives MCP tool calls directly via deterministic keyword routing;
  #   no LLM in the loop. Exercises cidgar's Channel 3 tool-result rewrite
  #   + f1/f4/f5 governance on the MCP path.
  adapter-direct-mcp:
    build: ./adapters/direct-mcp
    image: aiplay-adapter-direct-mcp:local
    environment:
      - ADAPTER_PORT=5010
      - AGW_MCP_WEATHER=http://agentgateway:8080/mcp/weather
      - AGW_MCP_NEWS=http://agentgateway:8080/mcp/news
      - AGW_MCP_LIBRARY=http://agentgateway:8080/mcp/library
      - AGW_MCP_FETCH=http://agentgateway:8080/mcp/fetch
      - DIRECT_MCP_WEATHER=http://mcp-weather:8000/mcp
      - DIRECT_MCP_NEWS=http://mcp-news:8000/mcp
      - DIRECT_MCP_LIBRARY=http://mcp-library:8000/mcp
      - DIRECT_MCP_FETCH=http://mcp-fetch:8000/mcp
    extra_hosts:
      - "host.docker.internal:192.168.64.1"
    depends_on:
      - agentgateway
    networks: [aiplay-network]
    restart: unless-stopped

  # ── Adapter: langgraph (Plan B T2) — chat via create_react_agent ──
  #   langgraph's prebuilt ReAct agent wraps the LLM↔tool hop loop into a
  #   single graph.ainvoke; same langchain-core primitives underneath, so
  #   httpx capture + cidgar governance still work end-to-end.
  adapter-langgraph:
    build: ./adapters/langgraph
    image: aiplay-adapter-langgraph:local
    environment:
      - ADAPTER_PORT=5011
      - AGW_LLM_BASE_URL_OLLAMA=http://agentgateway:8080/llm/ollama/v1
      - AGW_LLM_BASE_URL_MOCK=http://agentgateway:8080/llm/mock/v1
      - AGW_LLM_BASE_URL_OPENAI=http://agentgateway:8080/llm/chatgpt/v1
      - AGW_LLM_BASE_URL_GEMINI=http://agentgateway:8080/llm/gemini/v1beta/openai
      - AGW_MCP_WEATHER=http://agentgateway:8080/mcp/weather
      - AGW_MCP_NEWS=http://agentgateway:8080/mcp/news
      - AGW_MCP_LIBRARY=http://agentgateway:8080/mcp/library
      - AGW_MCP_FETCH=http://agentgateway:8080/mcp/fetch
      - DIRECT_LLM_BASE_URL_OLLAMA=http://host.docker.internal:11434/v1
      - DIRECT_LLM_BASE_URL_MOCK=http://mock-llm:8000/v1
      - DIRECT_LLM_BASE_URL_OPENAI=https://api.openai.com/v1
      - DIRECT_LLM_BASE_URL_GEMINI=https://generativelanguage.googleapis.com/v1beta/openai
      - DIRECT_MCP_WEATHER=http://mcp-weather:8000/mcp
      - DIRECT_MCP_NEWS=http://mcp-news:8000/mcp
      - DIRECT_MCP_LIBRARY=http://mcp-library:8000/mcp
      - DIRECT_MCP_FETCH=http://mcp-fetch:8000/mcp
      - DEFAULT_OLLAMA_MODEL=qwen2.5:7b
    env_file: [.env]
    extra_hosts:
      - "host.docker.internal:192.168.64.1"
    depends_on:
      - agentgateway
    networks: [aiplay-network]
    restart: unless-stopped

  # ── Adapter: crewai (Plan B T3) — Crew + Agent + Task via native SDKs ──
  #   crewai 1.14+ routes openai/, anthropic/, ollama/ models to their
  #   native SDKs (OpenAI, Anthropic, OpenAICompatible). We inject our
  #   own hooked httpx.Client + httpx.AsyncClient into those SDKs so wire
  #   bytes for LLM + MCP traffic flow through the same capture path as
  #   the langchain/langgraph adapters. Supports api=chat (ollama/chatgpt/
  #   gemini/mock) AND api=messages (claude) via a single adapter.
  adapter-crewai:
    build: ./adapters/crewai
    image: aiplay-adapter-crewai:local
    environment:
      - ADAPTER_PORT=5012
      - AGW_LLM_BASE_URL_OLLAMA=http://agentgateway:8080/llm/ollama/v1
      - AGW_LLM_BASE_URL_MOCK=http://agentgateway:8080/llm/mock/v1
      - AGW_LLM_BASE_URL_OPENAI=http://agentgateway:8080/llm/chatgpt/v1
      - AGW_LLM_BASE_URL_GEMINI=http://agentgateway:8080/llm/gemini/v1beta/openai
      # Anthropic SDK appends /v1/messages itself — don't include /v1 suffix here.
      - AGW_LLM_BASE_URL_ANTHROPIC=http://agentgateway:8080/llm/claude
      - AGW_MCP_WEATHER=http://agentgateway:8080/mcp/weather
      - AGW_MCP_NEWS=http://agentgateway:8080/mcp/news
      - AGW_MCP_LIBRARY=http://agentgateway:8080/mcp/library
      - AGW_MCP_FETCH=http://agentgateway:8080/mcp/fetch
      - DIRECT_LLM_BASE_URL_OLLAMA=http://host.docker.internal:11434/v1
      - DIRECT_LLM_BASE_URL_MOCK=http://mock-llm:8000/v1
      - DIRECT_LLM_BASE_URL_OPENAI=https://api.openai.com/v1
      - DIRECT_LLM_BASE_URL_GEMINI=https://generativelanguage.googleapis.com/v1beta/openai
      - DIRECT_LLM_BASE_URL_ANTHROPIC=https://api.anthropic.com
      - DIRECT_MCP_WEATHER=http://mcp-weather:8000/mcp
      - DIRECT_MCP_NEWS=http://mcp-news:8000/mcp
      - DIRECT_MCP_LIBRARY=http://mcp-library:8000/mcp
      - DIRECT_MCP_FETCH=http://mcp-fetch:8000/mcp
      - DEFAULT_OLLAMA_MODEL=qwen2.5:7b
    env_file: [.env]
    extra_hosts:
      - "host.docker.internal:192.168.64.1"
    depends_on:
      - agentgateway
    networks: [aiplay-network]
    restart: unless-stopped

  # ── Adapter: pydantic-ai (Plan B T4) — typed Agent + Model + Toolset ──
  #   pydantic-ai's OpenAIChatModel / OpenAIResponsesModel / AnthropicModel
  #   each take a Provider that accepts `http_client=httpx.AsyncClient`, and
  #   MCPServerStreamableHTTP is itself a Toolset that takes `http_client=`.
  #   So a SINGLE hooked httpx.AsyncClient captures both LLM + MCP wire
  #   bytes — no monkey-patching, no SDK client rebuilds. Supports api=chat
  #   (ollama/chatgpt/gemini/mock), api=messages (claude), AND api=responses
  #   (chatgpt) via one adapter.
  adapter-pydantic-ai:
    build: ./adapters/pydantic_ai
    image: aiplay-adapter-pydantic-ai:local
    environment:
      - ADAPTER_PORT=5013
      - AGW_LLM_BASE_URL_OLLAMA=http://agentgateway:8080/llm/ollama/v1
      - AGW_LLM_BASE_URL_MOCK=http://agentgateway:8080/llm/mock/v1
      - AGW_LLM_BASE_URL_OPENAI=http://agentgateway:8080/llm/chatgpt/v1
      - AGW_LLM_BASE_URL_GEMINI=http://agentgateway:8080/llm/gemini/v1beta/openai
      # Anthropic SDK appends /v1/messages itself — don't include /v1 suffix here.
      - AGW_LLM_BASE_URL_ANTHROPIC=http://agentgateway:8080/llm/claude
      - AGW_MCP_WEATHER=http://agentgateway:8080/mcp/weather
      - AGW_MCP_NEWS=http://agentgateway:8080/mcp/news
      - AGW_MCP_LIBRARY=http://agentgateway:8080/mcp/library
      - AGW_MCP_FETCH=http://agentgateway:8080/mcp/fetch
      - DIRECT_LLM_BASE_URL_OLLAMA=http://host.docker.internal:11434/v1
      - DIRECT_LLM_BASE_URL_MOCK=http://mock-llm:8000/v1
      - DIRECT_LLM_BASE_URL_OPENAI=https://api.openai.com/v1
      - DIRECT_LLM_BASE_URL_GEMINI=https://generativelanguage.googleapis.com/v1beta/openai
      - DIRECT_LLM_BASE_URL_ANTHROPIC=https://api.anthropic.com
      - DIRECT_MCP_WEATHER=http://mcp-weather:8000/mcp
      - DIRECT_MCP_NEWS=http://mcp-news:8000/mcp
      - DIRECT_MCP_LIBRARY=http://mcp-library:8000/mcp
      - DIRECT_MCP_FETCH=http://mcp-fetch:8000/mcp
      - DEFAULT_OLLAMA_MODEL=qwen2.5:7b
    env_file: [.env]
    extra_hosts:
      - "host.docker.internal:192.168.64.1"
    depends_on:
      - agentgateway
    networks: [aiplay-network]
    restart: unless-stopped

  # ── Adapter: autogen (Plan B T5) — AssistantAgent + autogen-ext clients ──
  #   First adapter to cover ALL 4 APIs: chat (OpenAIChatCompletionClient),
  #   messages (AnthropicChatCompletionClient), responses + responses+conv
  #   (openai.AsyncOpenAI.responses.create bypass; autogen-ext doesn't
  #   ship a Responses client as of 0.7). Both autogen-ext model clients
  #   accept `http_client=`, so LLM capture uses a single shared
  #   httpx.AsyncClient with event_hooks. MCP capture wraps fastmcp.Client
  #   (autogen-ext's mcp_server_tools uses the mcp SDK's streamablehttp_client
  #   which can't be given a custom httpx). Unlocks verdict (e) testing in T11
  #   via /trials/{id}/force_state_ref.
  adapter-autogen:
    build: ./adapters/autogen
    image: aiplay-adapter-autogen:local
    environment:
      - ADAPTER_PORT=5014
      - AGW_LLM_BASE_URL_OLLAMA=http://agentgateway:8080/llm/ollama/v1
      - AGW_LLM_BASE_URL_MOCK=http://agentgateway:8080/llm/mock/v1
      - AGW_LLM_BASE_URL_OPENAI=http://agentgateway:8080/llm/chatgpt/v1
      - AGW_LLM_BASE_URL_GEMINI=http://agentgateway:8080/llm/gemini/v1beta/openai
      # Anthropic SDK appends /v1/messages itself — don't include /v1 suffix here.
      - AGW_LLM_BASE_URL_ANTHROPIC=http://agentgateway:8080/llm/claude
      - AGW_MCP_WEATHER=http://agentgateway:8080/mcp/weather
      - AGW_MCP_NEWS=http://agentgateway:8080/mcp/news
      - AGW_MCP_LIBRARY=http://agentgateway:8080/mcp/library
      - AGW_MCP_FETCH=http://agentgateway:8080/mcp/fetch
      - DIRECT_LLM_BASE_URL_OLLAMA=http://host.docker.internal:11434/v1
      - DIRECT_LLM_BASE_URL_MOCK=http://mock-llm:8000/v1
      - DIRECT_LLM_BASE_URL_OPENAI=https://api.openai.com/v1
      - DIRECT_LLM_BASE_URL_GEMINI=https://generativelanguage.googleapis.com/v1beta/openai
      - DIRECT_LLM_BASE_URL_ANTHROPIC=https://api.anthropic.com
      - DIRECT_MCP_WEATHER=http://mcp-weather:8000/mcp
      - DIRECT_MCP_NEWS=http://mcp-news:8000/mcp
      - DIRECT_MCP_LIBRARY=http://mcp-library:8000/mcp
      - DIRECT_MCP_FETCH=http://mcp-fetch:8000/mcp
      - DEFAULT_OLLAMA_MODEL=qwen2.5:7b
    env_file: [.env]
    extra_hosts:
      - "host.docker.internal:192.168.64.1"
    depends_on:
      - agentgateway
    networks: [aiplay-network]
    restart: unless-stopped

  # ── Adapter: llamaindex (Plan B T6) — llama_index OpenAI LLM + responses bypass ──
  #   Sixth and final Plan B framework adapter. Covers chat (via
  #   `llama_index.llms.openai.OpenAI` with `async_http_client=` injection)
  #   + responses + responses+conv (via direct `openai.AsyncOpenAI.responses.create`
  #   bypass + chained `previous_response_id`, mirroring adapter-autogen).
  #   Does NOT cover api=messages — llama_index lacks a first-class Anthropic
  #   Messages wrapper on the OpenAI-catalog tier, and crewai/autogen/pydantic-ai
  #   already serve that combo. MCP capture wraps fastmcp.Client (same pattern
  #   as crewai/autogen — llama-index-tools-mcp's McpToolSpec builds an mcp-sdk
  #   streamablehttp_client which can't take a custom httpx).
  adapter-llamaindex:
    build: ./adapters/llamaindex
    image: aiplay-adapter-llamaindex:local
    environment:
      - ADAPTER_PORT=5015
      - AGW_LLM_BASE_URL_OLLAMA=http://agentgateway:8080/llm/ollama/v1
      - AGW_LLM_BASE_URL_MOCK=http://agentgateway:8080/llm/mock/v1
      - AGW_LLM_BASE_URL_OPENAI=http://agentgateway:8080/llm/chatgpt/v1
      - AGW_LLM_BASE_URL_GEMINI=http://agentgateway:8080/llm/gemini/v1beta/openai
      # Anthropic base carried for consistency with sibling adapters even
      # though llamaindex adapter doesn't serve api=messages.
      - AGW_LLM_BASE_URL_ANTHROPIC=http://agentgateway:8080/llm/claude
      - AGW_MCP_WEATHER=http://agentgateway:8080/mcp/weather
      - AGW_MCP_NEWS=http://agentgateway:8080/mcp/news
      - AGW_MCP_LIBRARY=http://agentgateway:8080/mcp/library
      - AGW_MCP_FETCH=http://agentgateway:8080/mcp/fetch
      - DIRECT_LLM_BASE_URL_OLLAMA=http://host.docker.internal:11434/v1
      - DIRECT_LLM_BASE_URL_MOCK=http://mock-llm:8000/v1
      - DIRECT_LLM_BASE_URL_OPENAI=https://api.openai.com/v1
      - DIRECT_LLM_BASE_URL_GEMINI=https://generativelanguage.googleapis.com/v1beta/openai
      - DIRECT_LLM_BASE_URL_ANTHROPIC=https://api.anthropic.com
      - DIRECT_MCP_WEATHER=http://mcp-weather:8000/mcp
      - DIRECT_MCP_NEWS=http://mcp-news:8000/mcp
      - DIRECT_MCP_LIBRARY=http://mcp-library:8000/mcp
      - DIRECT_MCP_FETCH=http://mcp-fetch:8000/mcp
      - DEFAULT_OLLAMA_MODEL=qwen2.5:7b
    env_file: [.env]
    extra_hosts:
      - "host.docker.internal:192.168.64.1"
    depends_on:
      - agentgateway
    networks: [aiplay-network]
    restart: unless-stopped

  # ── MCP servers (all 4 imported from demo; all on aiplay-network) ──
  mcp-weather:
    build: ./mcp/weather
    image: aiplay-mcp-weather:local
    networks: [aiplay-network]
    restart: unless-stopped

  mcp-news:
    build: ./mcp/news
    image: aiplay-mcp-news:local
    networks: [aiplay-network]
    restart: unless-stopped

  mcp-library:
    build: ./mcp/library
    image: aiplay-mcp-library:local
    networks: [aiplay-network]
    restart: unless-stopped

  mcp-fetch:
    build: ./mcp/fetch
    image: aiplay-mcp-fetch:local
    networks: [aiplay-network]
    restart: unless-stopped

  # ── Mock LLM: upstream that honors n > 1 for multi-choice testing ──
  #   Used by the 'mock' LLM provider for verifying cidgar injects C2
  #   markers into every choice (completions_shape.rs iter_mut).
  mock-llm:
    build: ./mock_llm
    image: aiplay-mock-llm:local
    networks: [aiplay-network]
    restart: unless-stopped
