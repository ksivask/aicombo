# yaml-language-server: $schema=https://raw.githubusercontent.com/agentgateway/agentgateway/main/schema/config.json
#
# aiplay — AGW gateway config for cidgar Harness C MVP
#
# All routes governed (cidgar policy present). Plan A exposes:
#   - /llm/ollama/*        → host.docker.internal:11434 (Ollama on host)
#   - /mcp/{weather,news,library,fetch} → fastmcp containers
#
# Plan B adds /llm/chatgpt/, /llm/claude/, /llm/gemini/ routes.
#
# The cidgar governance policy is identical on every route — it's what makes
# this a cidgar test harness. Tweaking per-route is a Plan B exercise.

binds:
  - port: 8080
    listeners:
      - protocol: HTTP
        routes:

          # ── LLM route: Ollama (primary provider in Plan A) ──
          - name: llm-ollama
            matches:
              - path:
                  pathPrefix: /llm/ollama/
            policies:
              urlRewrite:
                path:
                  prefix: /
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                  header_passthrough: true
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - ai:
                  name: ollama
                  provider:
                    openAI: {}
                  hostOverride: "host.docker.internal:11434"

          # ── LLM route: mock (for multi-choice n>1 testing) ──
          #   upstream is mock_llm/, a FastAPI server that honors n>1
          #   and returns deterministic per-choice content. Used to verify
          #   cidgar injects C2 text marker into EACH choice per
          #   completions_shape.rs:165 `for choice in resp.choices.iter_mut()`.
          - name: llm-mock
            matches:
              - path:
                  pathPrefix: /llm/mock/
            policies:
              urlRewrite:
                path:
                  prefix: /
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                  header_passthrough: true
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - ai:
                  name: mock-openai
                  provider:
                    openAI: {}
                  hostOverride: "mock-llm:8000"

          # ── LLM route: chatgpt (OpenAI) ──
          #   Used by crewai/pydantic-ai/autogen/llamaindex adapters in Plan B
          #   for chat completions + Responses API. Adapters supply their own
          #   OPENAI_API_KEY via Authorization: Bearer <key>; AGW proxies that
          #   header through to api.openai.com unchanged.
          - name: llm-chatgpt
            matches:
              - path:
                  pathPrefix: /llm/chatgpt/
            policies:
              urlRewrite:
                path:
                  prefix: /
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                  header_passthrough: true
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - ai:
                  name: openai
                  provider:
                    openAI: {}
                  hostOverride: "api.openai.com:443"
                  policies:
                    backendTLS: {}

          # ── LLM route: claude (Anthropic) ──
          #   Used by crewai/pydantic-ai adapters for the Messages API.
          #
          #   CRITICAL: ai.routes map REQUIRED for Messages-shape dispatch.
          #   Without it, AGW defaults to the Completions parser and
          #   governance's messages_shape walker never fires. This is
          #   the same gotcha fixed in cidgar Harness B commit 9d7b882e.
          - name: llm-claude
            matches:
              - path:
                  pathPrefix: /llm/claude/
            policies:
              urlRewrite:
                path:
                  prefix: /
              ai:
                routes:
                  "/v1/messages": messages
                  "/v1/messages/count_tokens": anthropicTokenCount
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                  header_passthrough: true
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - ai:
                  name: anthropic
                  provider:
                    anthropic: {}
                  hostOverride: "api.anthropic.com:443"
                  policies:
                    backendTLS: {}

          # ── LLM route: gemini (Google, OpenAI-compat endpoint) ──
          #   Gemini exposes /v1beta/openai/chat/completions as an OpenAI-
          #   compatible chat-completions endpoint, so we use provider:
          #   openAI here (not a separate google provider). Adapters supply
          #   GOOGLE_API_KEY via Authorization: Bearer <key>.
          - name: llm-gemini
            matches:
              - path:
                  pathPrefix: /llm/gemini/
            policies:
              urlRewrite:
                path:
                  prefix: /
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                  header_passthrough: true
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - ai:
                  name: gemini
                  provider:
                    openAI: {}
                  hostOverride: "generativelanguage.googleapis.com:443"
                  policies:
                    backendTLS: {}

          # ── MCP route: weather ──
          - name: mcp-weather
            matches:
              - path:
                  pathPrefix: /mcp/weather
            policies:
              urlRewrite:
                path:
                  prefix: /mcp
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - mcp:
                  prefixMode: always
                  targets:
                    - name: weather
                      mcp:
                        host: http://mcp-weather:8000/mcp

          # ── MCP route: news ──
          - name: mcp-news
            matches:
              - path:
                  pathPrefix: /mcp/news
            policies:
              urlRewrite:
                path:
                  prefix: /mcp
              governance:
                kind: cid_gar
                log_level: debug
            backends:
              - mcp:
                  prefixMode: always
                  targets:
                    - name: news
                      mcp:
                        host: http://mcp-news:8000/mcp

          # ── MCP route: library ──
          - name: mcp-library
            matches:
              - path:
                  pathPrefix: /mcp/library
            policies:
              urlRewrite:
                path:
                  prefix: /mcp
              governance:
                kind: cid_gar
                log_level: debug
            backends:
              - mcp:
                  prefixMode: always
                  targets:
                    - name: library
                      mcp:
                        host: http://mcp-library:8000/mcp

          # ── MCP route: fetch ──
          - name: mcp-fetch
            matches:
              - path:
                  pathPrefix: /mcp/fetch
            policies:
              urlRewrite:
                path:
                  prefix: /mcp
              governance:
                kind: cid_gar
                log_level: debug
            backends:
              - mcp:
                  prefixMode: always
                  targets:
                    - name: fetch
                      mcp:
                        host: http://mcp-fetch:8000/mcp
