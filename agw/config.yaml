# yaml-language-server: $schema=https://raw.githubusercontent.com/agentgateway/agentgateway/main/schema/config.json
#
# aiplay — AGW gateway config for cidgar Harness C MVP
#
# All routes governed (cidgar policy present). Plan A exposes:
#   - /llm/ollama/*        → host.docker.internal:11434 (Ollama on host)
#   - /mcp/{weather,news,library,fetch} → fastmcp containers
#
# Plan B adds /llm/chatgpt/, /llm/claude/, /llm/gemini/ routes.
#
# The cidgar governance policy is identical on every route — it's what makes
# this a cidgar test harness. Tweaking per-route is a Plan B exercise.

binds:
  - port: 8080
    listeners:
      - protocol: HTTP
        routes:

          # ── LLM route: Ollama (primary provider in Plan A) ──
          - name: llm-ollama
            matches:
              - path:
                  pathPrefix: /llm/ollama/
            policies:
              urlRewrite:
                path:
                  prefix: /
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                  header_passthrough: true
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - ai:
                  name: ollama
                  provider:
                    openAI: {}
                  hostOverride: "host.docker.internal:11434"

          # ── LLM route: mock (for multi-choice n>1 testing) ──
          #   upstream is mock_llm/, a FastAPI server that honors n>1
          #   and returns deterministic per-choice content. Used to verify
          #   cidgar injects C2 text marker into EACH choice per
          #   completions_shape.rs:165 `for choice in resp.choices.iter_mut()`.
          - name: llm-mock
            matches:
              - path:
                  pathPrefix: /llm/mock/
            policies:
              urlRewrite:
                path:
                  prefix: /
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                  header_passthrough: true
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - ai:
                  name: mock-openai
                  provider:
                    openAI: {}
                  hostOverride: "mock-llm:8000"

          # ── LLM route: chatgpt (OpenAI) ──
          #   Used by crewai/pydantic-ai/autogen/llamaindex adapters in Plan B
          #   for chat completions + Responses API. Adapters supply their own
          #   OPENAI_API_KEY via Authorization: Bearer <key>; AGW proxies that
          #   header through to api.openai.com unchanged.
          - name: llm-chatgpt
            matches:
              - path:
                  pathPrefix: /llm/chatgpt/
            policies:
              urlRewrite:
                path:
                  prefix: /
              # CRITICAL: ai.routes map REQUIRED for Responses-shape dispatch.
              # Without it, AGW defaults to the Completions parser for every
              # path under this route → /v1/responses requests fail with
              # "missing field `messages`" because the Responses body has
              # `input` not `messages`. Same gotcha as the claude route below
              # (which needs the map for messages-shape dispatch).
              ai:
                routes:
                  "/v1/chat/completions": completions
                  "/v1/responses": responses
                  # E13c — Conversations API setup endpoint. Per-trial container
                  # mint goes here: POST /v1/conversations → {id: conv_xxx}.
                  # passthrough is correct (RouteType::Passthrough, schema!
                  # macro renames camelCase → "passthrough" in YAML); AGW
                  # byte-forwards without invoking the Completions/Responses
                  # parser. Without this entry the default Completions parser
                  # 503s on the setup body shape.
                  "/v1/conversations": passthrough
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                  header_passthrough: true
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - ai:
                  name: openai
                  provider:
                    openAI: {}
                  hostOverride: "api.openai.com:443"
                  policies:
                    backendTLS: {}

          # ── LLM route: claude (Anthropic) ──
          #   Used by crewai/pydantic-ai adapters for the Messages API.
          #
          #   CRITICAL: ai.routes map REQUIRED for Messages-shape dispatch.
          #   Without it, AGW defaults to the Completions parser and
          #   governance's messages_shape walker never fires. This is
          #   the same gotcha fixed in cidgar Harness B commit 9d7b882e.
          - name: llm-claude
            matches:
              - path:
                  pathPrefix: /llm/claude/
            policies:
              urlRewrite:
                path:
                  prefix: /
              ai:
                routes:
                  "/v1/messages": messages
                  "/v1/messages/count_tokens": anthropicTokenCount
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                  header_passthrough: true
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - ai:
                  name: anthropic
                  provider:
                    anthropic: {}
                  hostOverride: "api.anthropic.com:443"
                  policies:
                    backendTLS: {}

          # ── LLM route: gemini (Google, OpenAI-compat endpoint) ──
          #   Gemini exposes /v1beta/openai/chat/completions as an OpenAI-
          #   compatible chat-completions endpoint, so we use provider:
          #   openAI here (not a separate google provider). Adapters supply
          #   GOOGLE_API_KEY via Authorization: Bearer <key>.
          - name: llm-gemini
            matches:
              - path:
                  pathPrefix: /llm/gemini/
            policies:
              urlRewrite:
                path:
                  prefix: /
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                  header_passthrough: true
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - ai:
                  name: gemini
                  provider:
                    openAI: {}
                  hostOverride: "generativelanguage.googleapis.com:443"
                  policies:
                    backendTLS: {}

          # ── MCP route: weather ──
          - name: mcp-weather
            matches:
              - path:
                  pathPrefix: /mcp/weather
            policies:
              urlRewrite:
                path:
                  prefix: /mcp
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - mcp:
                  prefixMode: always
                  targets:
                    - name: weather
                      mcp:
                        host: http://mcp-weather:8000/mcp

          # ── MCP route: news ──
          - name: mcp-news
            matches:
              - path:
                  pathPrefix: /mcp/news
            policies:
              urlRewrite:
                path:
                  prefix: /mcp
              governance:
                kind: cid_gar
                log_level: debug
            backends:
              - mcp:
                  prefixMode: always
                  targets:
                    - name: news
                      mcp:
                        host: http://mcp-news:8000/mcp

          # ── MCP route: library ──
          - name: mcp-library
            matches:
              - path:
                  pathPrefix: /mcp/library
            policies:
              urlRewrite:
                path:
                  prefix: /mcp
              governance:
                kind: cid_gar
                log_level: debug
            backends:
              - mcp:
                  prefixMode: always
                  targets:
                    - name: library
                      mcp:
                        host: http://mcp-library:8000/mcp

          # ── MCP route: mutable-admin (E22) ──
          #
          # MUST come BEFORE mcp-mutable below — AGW matches routes in
          # declaration order and we want the more-specific /_admin path
          # prefix to win. NO governance: the admin endpoints are test
          # infrastructure for runtime tool-list mutation (E20 verification
          # harness), not conversational MCP traffic. Routing them through
          # cidgar would pollute the audit stream with non-conversational
          # events and add a transformation hop that has no semantic value
          # for the test surface.
          - name: mcp-mutable-admin
            matches:
              - path:
                  pathPrefix: /mcp/mutable/_admin
            policies:
              urlRewrite:
                path:
                  prefix: /_admin
            backends:
              # Plain HTTP passthrough (Opaque backend). The admin endpoints
              # are vanilla REST (Starlette `@mcp.custom_route`), NOT JSON-RPC.
              # An `mcp:` backend would 415/400 every admin call because
              # AGW's mcp upstream requires:
              #   1. Accept header containing BOTH `application/json` AND
              #      `text/event-stream` (harness sends only application/json),
              #   2. body to deserialize as `ClientJsonRpcMessage` (harness
              #      sends `{"tools": [...]}` — pure REST shape).
              # See AGW src/mcp/streamablehttp.rs::handle_post for both checks.
              # The urlRewrite above turns `/mcp/mutable/_admin/<op>` into
              # `/_admin/<op>` so the upstream URL on mcp-mutable:8000 is
              # exactly what its custom_route handlers register.
              - host: mcp-mutable:8000

          # ── MCP route: mutable (E22) ──
          #
          # Test MCP server with a runtime-mutable tool list. Standard
          # cidgar governance applies on the MCP path; admin path above
          # carves out the /_admin/* prefix so harness mutation calls
          # bypass governance.
          - name: mcp-mutable
            matches:
              - path:
                  pathPrefix: /mcp/mutable
            policies:
              urlRewrite:
                path:
                  prefix: /mcp
              governance:
                kind: cid_gar
                log_level: debug
                cid:
                  generator: uuid4_12
                gar:
                  schema_required: true
                channels:
                  text_marker: true
                  resource_block: true
            backends:
              - mcp:
                  prefixMode: always
                  targets:
                    - name: mutable
                      mcp:
                        host: http://mcp-mutable:8000/mcp

          # ── MCP route: fetch ──
          #
          # E7 demo — this route opts into mcp_marker_kind=both so the f5 hook
          # emits BOTH a spec-compliant `resource` content block (for MCP
          # clients that preserve non-text content) AND a plain-text marker
          # block carrying the same <!-- ib:cid=... --> needle (for agents
          # that flatten tool_result.content to text and drop non-text
          # blocks). Other MCP routes (weather/news/library) intentionally
          # omit the field and get the default (Resource) — this demonstrates
          # per-route granularity of the new AGW knob.
          - name: mcp-fetch
            matches:
              - path:
                  pathPrefix: /mcp/fetch
            policies:
              urlRewrite:
                path:
                  prefix: /mcp
              governance:
                kind: cid_gar
                log_level: debug
                channels:
                  text_marker: true
                  resource_block: true
                  mcp_marker_kind: both  # E7 — emit resource AND text markers.
                  # Requires AGW image built from ibfork/feat/cidgar
                  # commit 5c96003a or later. Older binaries reject this field.
            backends:
              - mcp:
                  prefixMode: always
                  targets:
                    - name: fetch
                      mcp:
                        host: http://mcp-fetch:8000/mcp
